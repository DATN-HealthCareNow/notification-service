name: CI - Build & Push Docker Image

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  SERVICE_NAME: 'healthcare-notification-service'

jobs:
  build-and-push:
    permissions:
      id-token: write 
      contents: read
    name: 🏗️ Build & Push
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:latest
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: 🧪 Run Unit Tests
        env:
          ACCESS_KEY: test-dummy-access-key
          SECRET_KEY: test-dummy-secret-key
          AWS_REGION: ap-southeast-1
        run: mvn test --batch-mode --fail-at-end

      - name: 📦 Build with Maven
        run: mvn clean package -DskipTests --batch-mode

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: 🚪 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: 🚀 Build & Push Docker Image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.SERVICE_NAME }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 🚀 CD - Push code to Production Server (EC2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "1. Đăng nhập vào AWS ECR..."
            aws ecr get-login-password --region ap-southeast-1 | sudo docker login --username AWS --password-stdin 632469639580.dkr.ecr.ap-southeast-1.amazonaws.com
            
            echo "2. Kéo (Pull) image mới nhất về từ ECR..."
            sudo docker pull 632469639580.dkr.ecr.ap-southeast-1.amazonaws.com/healthcare-notification-service:latest
            
            echo "3. Cập nhật và khởi động lại notification-service..."
            cd ~/devops_service || cd ~/devops-service || exit 1
            sudo docker compose up -d notification-service
            
            echo "4. Dọn dẹp các Image cũ để tránh đầy ổ cứng server..."
            sudo docker image prune -f
