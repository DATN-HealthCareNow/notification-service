name: Deploy Notification Service to EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_IP }}
          username: ubuntu # (hoặc ec2-user nếu dùng Amazon Linux)
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            # 1. Di chuyển vào thư mục code và pull mới nhất
            # Thử cả hai đường dẫn phổ biến, nếu sai bạn hãy thay bằng đường dẫn thực tế trên EC2
            cd ~/notification-service || cd ~/HealthCareNow/notification-service || exit 1
            
            echo "Pulling latest code..."
            git pull origin main
            
            # 2. Di chuyển sang thư mục devops để chạy Docker Compose (vì file config nằm ở đó)
            cd ~/devops-service || cd ~/HealthCareNow/devops-service || exit 1
            
            # 3. Sử dụng 'docker compose' thay vì 'docker-compose' và dùng sudo nếu cần
            echo "Restarting notification-service..."
            sudo docker compose up -d --build notification-service
            
            # 4. Dọn dẹp image cũ
            sudo docker image prune -f
