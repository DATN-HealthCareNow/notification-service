server:
  port: 8084

app:
  internal-token: ${APP_INTERNAL_TOKEN:hcn-internal-secret-2024}

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  application:
    name: notification-service

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27020/healthcare_notification}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

logging:
  level:
    com.healthcarenow: DEBUG
    org.springframework.amqp: INFO

# Expo Push Token URL mapping
expo:
  push:
    apiUrl: https://exp.host/--/api/v2/push/send

notification:
  water-reminder:
    enabled: ${WATER_REMINDER_ENABLED:true}
    windows: ${WATER_REMINDER_WINDOWS:7-8,11-12,17-18}
    check-interval-ms: ${WATER_REMINDER_CHECK_INTERVAL_MS:60000}
    initial-delay-ms: ${WATER_REMINDER_INITIAL_DELAY_MS:10000}
  exercise-minutes-reminder:
    enabled: ${EXERCISE_MINUTES_REMINDER_ENABLED:true}
    reminder-hour: ${EXERCISE_MINUTES_REMINDER_HOUR:7}
    window-minutes: ${EXERCISE_MINUTES_REMINDER_WINDOW_MINUTES:10}
    threshold-minutes: ${EXERCISE_MINUTES_REMINDER_THRESHOLD_MINUTES:30}
    check-interval-ms: ${EXERCISE_MINUTES_REMINDER_CHECK_INTERVAL_MS:60000}
    initial-delay-ms: ${EXERCISE_MINUTES_REMINDER_INITIAL_DELAY_MS:20000}
  realtime:
    bff-internal-url: ${BFF_INTERNAL_URL:http://bff-service:8090}
